name: Security checks

on:
  # Run directly on PRs targeting main for fast feedback
  pull_request:
    branches: [main]
  # Run after CI completes (for merges/rebases) to gate deploy path
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    # Run only when:
    # 1. It's a PR event (target main) OR
    # 2. A completed CI workflow_run on main concluded successfully
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        tool: [bandit, pip-audit]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: latest
          enable-cache: false

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            .venv
            ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Setup environment and install dependencies
        run: |
          uv venv --allow-existing
          uv sync --dev --all-extras

      - name: Install security tools
        run: |
          case "${{ matrix.tool }}" in
            bandit)
              uv pip install bandit
              ;;
            pip-audit)
              uv pip install pip-audit
              ;;
          esac

      - name: Run security scan - ${{ matrix.tool }}
        run: |
          case "${{ matrix.tool }}" in
            bandit)
              echo "🔍 Running Bandit security scan..."
              .venv/bin/bandit -r backend frontend functions \
                --exclude "*/utest/*,*/test_*,*test*.py" \
                -f json -o bandit-report-bandit.json || true
              test -f bandit-report-bandit.json || echo '[]' > bandit-report-bandit.json
              .venv/bin/bandit -r backend frontend functions \
                --exclude "*/utest/*,*/test_*,*test*.py" \
                -q
              ;;
            pip-audit)
              echo "🔍 Running pip-audit dependency scan..."
              .venv/bin/pip-audit --desc --output=json --output-file=pip-audit-report-pip-audit.json || true
              test -f pip-audit-report-pip-audit.json || echo '[]' > pip-audit-report-pip-audit.json
              .venv/bin/pip-audit --desc
              ;;
          esac

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-report-${{ matrix.tool }}
          path: '*-report-${{ matrix.tool }}.json'
          retention-days: 30
